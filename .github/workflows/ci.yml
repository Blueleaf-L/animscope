name: Validate Static Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy scipy matplotlib seaborn

      - name: Rebuild static data
        run: python scripts/build_static.py

      - name: Verify output
        run: |
          test -f data/static/overview.json && echo "overview.json OK"
          test -f data/static/companies_full.json && echo "companies_full.json OK"
          test -f data/static/rankings_recommended.json && echo "rankings OK"
          test -f data/static/trends.json && echo "trends OK"
