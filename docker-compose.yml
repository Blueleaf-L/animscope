version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: animation_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-animation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-animation_analysis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-animation} -d ${POSTGRES_DB:-animation_analysis}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: animation_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://animation:change_me@db:5432/animation_analysis}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: animation_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
