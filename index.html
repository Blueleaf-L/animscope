<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国动画公司作品分析平台</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js?v=3"></script>
</head>
<body>
  <!-- Header / Navigation -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#overview" class="logo" aria-label="首页">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="var(--color-primary)" stroke-width="2"/>
          <path d="M8 20L14 8l6 12H8z" fill="var(--color-primary)" opacity="0.8"/>
        </svg>
        <span class="logo-text">donghuascope</span>
      </a>

      <!-- Hamburger menu (mobile) -->
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="菜单">
        <span></span><span></span><span></span>
      </label>

      <nav class="site-nav" id="site-nav">
        <a href="#overview" data-nav="overview">📊 首页概览</a>
        <a href="#companies" data-nav="companies">🏢 公司总览</a>
        <a href="#rankings" data-nav="rankings">🏆 作品排行</a>
        <a href="#trends" data-nav="trends">📈 趋势分析</a>
        <a href="#compare" data-nav="compare">⚖️ 公司对比</a>
        <a href="#search" data-nav="search">🔍 作品搜索</a>
        <a href="#report" data-nav="report">📋 分析报告</a>
      </nav>

      <div class="header-actions">
        <button id="theme-toggle" class="theme-btn" aria-label="切换暗色模式" title="切换暗色模式">🌙</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-main" class="app-main">
    <!-- Skeleton loading -->
    <div id="skeleton" class="skeleton-container">
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
    </div>

    <!-- Page content container -->
    <div id="page-content" class="page-content" style="display:none;"></div>

    <!-- Error state -->
    <div id="error-state" class="error-state" style="display:none;">
      <div class="error-icon">⚠️</div>
      <h2>数据加载失败</h2>
      <p id="error-message"></p>
      <button id="retry-btn" class="btn btn-primary">重新加载</button>
    </div>
  </main>

  <!-- Global Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>中国动画公司作品分析平台 v2.0 · 数据来源：主流动画公司作品推荐表 · 仅供分析参考</p>
  </footer>

  <!-- JS Modules -->
  <script src="js/config.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/analytics.js?v=3"></script>
  <script src="js/charts.js?v=3"></script>
  <script src="js/views.js?v=3"></script>
  <script src="js/router.js?v=3"></script>
  <script src="js/pages/overview.js?v=3"></script>
  <script src="js/pages/companies.js?v=3"></script>
  <script src="js/pages/company-detail.js?v=3"></script>
  <script src="js/pages/rankings.js?v=3"></script>
  <script src="js/pages/trends.js?v=3"></script>
  <script src="js/pages/compare.js?v=3"></script>
  <script src="js/pages/search.js?v=3"></script>
  <script src="js/pages/report.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
