services:
  - type: web
    name: animation-platform
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python scripts/init_db.py --import-only && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/animation.db
      - key: SECRET_KEY
        generateValue: true
